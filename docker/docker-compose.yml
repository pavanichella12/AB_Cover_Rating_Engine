# ABCover Rating Engine - run with persistent database and logs
# Usage (from project root): docker compose -f docker/docker-compose.yml up --build
# Then open http://localhost:8501
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: abcover
    container_name: abcover-app
    ports:
      - "8501:8501"
    env_file: ../.env
    environment:
      - APP_DATA_DIR=/app/data
    volumes:
      - abcover_data:/app/data
    restart: unless-stopped

volumes:
  abcover_data:
